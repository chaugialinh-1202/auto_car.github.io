<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Liên Hệ - Dũng Lâm Auto Car</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="header">
      <div class="container">
        <div class="logo">
          <img src="../img/logo.png" alt="Dũng Lâm Auto Car" />
        </div>
        <nav class="nav">
          <ul>
            <li><a href="/">Trang Chủ</a></li>
            <li><a href="/#services">Bộ Sưu Tập Xe</a></li>
            <li><a href="" class="active">Liên Hệ Tư Vấn</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <section class="contact-hero">
      <div class="container">
        <h1>Kết Nối Với Chuyên Gia</h1>
      </div>
    </section>

    <section class="contact-content">
      <div class="container">
        <div class="contact-grid">
          <div class="contact-form-wrapper">
            <h3>Gửi Yêu Cầu Tư Vấn</h3>
            <form class="main-form">
              <div class="form-group">
                <input type="text" placeholder="Họ và Tên" required />
              </div>
              <div class="form-group">
                <input type="email" placeholder="Email" required />
              </div>
              <div class="form-group">
                <input type="tel" placeholder="Số điện thoại" required />
              </div>
              <div class="form-group">
                <textarea
                  placeholder="Nội dung cần tư vấn..."
                  rows="5"
                ></textarea>
              </div>
              <button type="submit" class="btn btn-primary">Gửi Ngay</button>
            </form>
          </div>
          <div class="contact-info-wrapper">
            <h3>Thông Tin Trực Tiếp</h3>
            <p><strong>Địa chỉ:</strong> Ấp 9, xã Vị Thuỷ, Thành Phố Cần Thơ</p>
            <p><strong>Hotline:</strong> 093 957 13 87 (Mr. Trần Duy Linh)</p>
            <p><strong>Email:</strong> contact@dunglamautocar.vn</p>
            <div class="map-placeholder">
              <!-- Tích hợp Google Maps theo F03 -->
              <div
                style="
                  background: white;
                  height: 200px;
                  display: flex;
                  align-items: center;
                  justify-content: center;
                  border: 1px solid #c5a059;
                "
              >
                <iframe
                  src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d15728.870153793527!2d105.5440571!3d9.7476323!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x31a0ef996999744d%3A0x47d7848360988157!2sAuto%20car%20D%C5%A9ng%20L%C3%A2m%2002!5e0!3m2!1sen!2s!4v1777899211170!5m2!1sen!2s"
                  width="600"
                  height="450"
                  style="border: 0"
                  allowfullscreen=""
                  loading="lazy"
                  referrerpolicy="no-referrer-when-downgrade"
                ></iframe>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <footer class="footer">
      <div class="container">
        <p>&copy; 2026 Dũng Lâm Auto Car. All rights reserved.</p>
      </div>
    </footer>
  </body>
</html>
